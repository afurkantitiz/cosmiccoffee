<!DOCTYPE html>
<html lang="tr" class="booting">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cosmic Coffee & More · Menü</title>
  <meta name="description" content="Cosmic Coffee & More — Yeni Nesil Kahve Dükkanı. Bafra, Samsun. Dijital menü: espresso bazlı içecekler, soğuk kahveler, tatlılar ve daha fazlası." />
  <meta name="theme-color" content="#0A0A0C" />

  <!-- Open Graph -->
  <meta property="og:title" content="Cosmic Coffee & More · Menü" />
  <meta property="og:description" content="Yeni Nesil Kahve Dükkanı — Bafra, Samsun" />
  <meta property="og:image" content="assets/logo.jpg" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="assets/logo.jpg" />
  <link rel="apple-touch-icon" href="assets/logo.jpg" />

  <!-- Fonts: self-hosted Cinzel (display, Roman inscriptional) + Jost (body, geometric) -->
  <link rel="stylesheet" href="assets/fonts/fonts.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== INTRO SPLASH (ilk açılışta logo ignite + yükseliş) ===== -->
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash__stage">
      <span class="splash__ring"></span>
      <span class="splash__ring splash__ring--2"></span>
      <img class="splash__logo" src="assets/logo.jpg" alt="" width="200" height="200" />
    </div>
  </div>

  <!-- ===== SVG icon sprite ===== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Greek meander (key) — single square-spiral unit -->
      <symbol id="ico-key" viewBox="0 0 26 16">
        <path d="M1 15V1H25V15H9V7H17V11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"/>
      </symbol>
      <!-- ember XXX mark (from logo) -->
      <symbol id="ico-xxx" viewBox="0 0 34 16">
        <path d="M3 3 11 13M11 3 3 13M13 3 21 13M21 3 13 13M23 3 31 13M31 3 23 13"
              fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </symbol>
      <symbol id="ico-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="21" y1="21" x2="16.6" y2="16.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="ico-pin" viewBox="0 0 24 24">
        <path d="M12 21s-7-6.3-7-11a7 7 0 1 1 14 0c0 4.7-7 11-7 11z" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <circle cx="12" cy="10" r="2.4" fill="none" stroke="currentColor" stroke-width="1.7"/>
      </symbol>
      <symbol id="ico-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <path d="M12 7v5.2l3.2 2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </symbol>
      <symbol id="ico-wa" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.004c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm0 1.67c2.2 0 4.27.86 5.83 2.42a8.2 8.2 0 0 1 2.42 5.82c0 4.54-3.7 8.24-8.25 8.24h-.003a8.22 8.22 0 0 1-4.19-1.15l-.3-.18-3.11.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.24 8.24-8.24zm4.76 10.4c-.26-.13-1.54-.76-1.78-.85-.24-.09-.41-.13-.59.13-.17.26-.67.85-.83 1.03-.15.17-.3.2-.56.07-.26-.13-1.1-.4-2.1-1.29-.78-.69-1.3-1.55-1.45-1.81-.15-.26-.02-.4.11-.53.12-.12.26-.3.4-.46.13-.15.17-.26.26-.44.09-.17.04-.33-.02-.46-.07-.13-.59-1.42-.81-1.94-.21-.51-.43-.44-.59-.45l-.5-.01c-.17 0-.46.06-.7.33-.24.26-.92.9-.92 2.2 0 1.29.94 2.54 1.08 2.72.13.17 1.85 2.83 4.48 3.97.63.27 1.11.43 1.49.55.63.2 1.2.17 1.65.1.5-.07 1.54-.63 1.76-1.24.22-.61.22-1.13.15-1.24-.06-.11-.24-.17-.5-.3z"/>
      </symbol>
      <symbol id="ico-ig" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <circle cx="17.2" cy="6.8" r="1.15" fill="currentColor"/>
      </symbol>
      <symbol id="ico-map" viewBox="0 0 24 24">
        <path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M9 4v14M15 6v14" fill="none" stroke="currentColor" stroke-width="1.6"/>
      </symbol>
    </defs>
  </svg>

  <!-- ===== HERO ===== -->
  <header class="hero" id="hero"><!-- filled by app.js --></header>

  <!-- ===== STICKY NAV ===== -->
  <nav class="nav" id="nav" aria-label="Menü kategorileri">
    <div class="nav__inner">
      <div class="search">
        <svg aria-hidden="true"><use href="#ico-search"/></svg>
        <input id="search" type="search" inputmode="search" autocomplete="off"
               placeholder="Menüde ara… (örn. latte, cheesecake)" aria-label="Menüde ara" />
      </div>
      <div class="rail" id="rail" role="tablist"><!-- filled by app.js --></div>
    </div>
  </nav>

  <!-- ===== MENU ===== -->
  <main class="wrap" id="menu" aria-live="polite"><!-- filled by app.js --></main>

  <!-- ===== FOOTER ===== -->
  <footer class="foot" id="foot"><!-- filled by app.js --></footer>

  <!-- ===== LIGHTBOX ===== -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Ürün görseli">
    <button class="lightbox__close" id="lightboxClose" aria-label="Kapat">&times;</button>
    <div class="lightbox__inner">
      <img id="lightboxImg" alt="" />
      <div class="lightbox__cap" id="lightboxCap"></div>
    </div>
  </div>

  <script src="js/app.js" defer></script>
</body>
</html>
